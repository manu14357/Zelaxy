<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna tip circle -->
  <circle cx="50" cy="15" r="4" stroke="#3b82f6" strokeWidth="5" fill="none" />
  
  <!-- Central antenna -->
  <path d="M50 15 L50 40" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
  
  <!-- Left V-shape peak -->
  <path d="M50 40 L35 20" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
  
  <!-- Right V-shape peak -->
  <path d="M50 40 L65 20" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none" />

  <!-- Left side flow -->
  <path d="M35 20 L20 45 L20 75 Q20 82 30 85 L50 85" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
  
  <!-- Right side flow -->
  <path d="M65 20 L80 45 L80 75 Q80 82 70 85 L50 85" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
  
  <!-- Left eye -->
  <circle cx="40" cy="55" r="4" fill="#3b82f6" />
  
  <!-- Right eye -->
  <circle cx="60" cy="55" r="4" fill="#3b82f6" />
  
  <!-- Smile -->
  <path d="M40 68 Q50 76 60 68" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
</svg>
